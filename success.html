<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mix Games – تم الإرسال ✅</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #5865f2;
      --purple-light: #7289da;
      --dark: #050608;
      --gold: #ffd700;
      --white: #f0f8ff;
      --green: #43b581;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      font-family: 'Cairo', sans-serif;
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }
    .bg-effects { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(88,101,242,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,101,242,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: absolute; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(67,181,129,0.12) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    .card {
      position: relative; z-index: 1;
      width: 480px;
      background: linear-gradient(145deg, rgba(13,14,26,0.97), rgba(5,6,8,0.99));
      border: 1px solid rgba(67,181,129,0.25);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,0,0,0.9), 0 0 40px rgba(67,181,129,0.1);
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0; transform: translateY(30px) scale(0.97);
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }
    .success-icon { font-size: 72px; margin-bottom: 20px; animation: bounce 1s ease 0.5s both; }
    @keyframes bounce {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-family: 'Tajawal', sans-serif;
      font-size: 26px; font-weight: 900;
      color: var(--green);
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(67,181,129,0.4);
    }
    .success-text {
      font-size: 14px;
      color: rgba(240,248,255,0.65);
      line-height: 1.8;
      margin-bottom: 28px;
    }
    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #25d366, #128c7e);
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-family: 'Tajawal', sans-serif;
      font-size: 16px; font-weight: 900;
      color: white;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(37,211,102,0.3);
      transition: all 0.3s;
      margin-bottom: 16px;
    }
    .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,211,102,0.4); }
    .back-link {
      display: block;
      font-size: 13px;
      color: var(--purple-light);
      text-decoration: none;
      margin-top: 8px;
      opacity: 0.7;
    }
    .back-link:hover { opacity: 1; }
    .brand {
      margin-top: 32px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 900;
      color: var(--purple-light);
      opacity: 0.5;
    }
    @media (max-width: 520px) { .card { width: 100%; padding: 40px 20px; } }
  </style>
</head>
<body>

<div class="bg-effects">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
</div>

<div class="card">
  <div class="success-icon">🎉</div>
  <div class="success-title">تم استلام طلبك!</div>
  <div class="success-text">

    هيتواصل معاك الأدمن في أقرب وقت بإذن الله وهيبعتلك لينك التفعيل. 🚀
  </div>
  <a href="https://wa.me/201211753648" target="_blank" class="wa-btn">
    💬 تواصل معانا على واتساب
  </a>
  <a href="index.html" class="back-link">← رجوع للموقع</a>
  <div class="brand">Mix_Games 💜</div>
</div>
